name: Shop Monitoring

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test-shop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install --with-deps chromium

      - id: shoptest
        run: npm test

      - name: Notify on failure (create GitHub issue)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Shop Monitoring fehlgeschlagen – ${new Date().toISOString().slice(0,10)}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `Der tägliche Shop-Monitoring-Lauf ist fehlgeschlagen.`,
              ``,
              `Mögliche Ursache: mindestens eine Variante ist nicht bestellbar (\`available === false\` oder \`cart/add.js\`-Fehler).`,
              ``,
              `**Run ansehen (mit Logs):** ${runUrl}`,
              ``,
              `In den Logs unter dem Step "npm test" stehen alle betroffenen Varianten als \`FAIL ...\` Zeilen.`,
              ``,
              `_Dieses Issue wurde automatisch vom Workflow erstellt._`
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['shop-monitoring', 'automated']
            });
