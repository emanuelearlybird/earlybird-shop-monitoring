name: Shop Monitoring

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test-shop:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install --with-deps chromium

      - id: shoptest
        name: Run shop monitoring
        run: npm test
        continue-on-error: true

      - name: Upload failures.json artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failures
          path: failures.json
          if-no-files-found: ignore

      - name: Notify on failure (deduplicated GitHub issue)
        if: steps.shoptest.outcome == 'failure'
        id: notify_issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let data = { failures: [] };
            try { data = JSON.parse(fs.readFileSync('failures.json', 'utf8')); } catch (e) {}
            const failures = data.failures || [];

            const ids = failures.map(f => String(f.variantId)).sort();
            const fingerprint = ids.length ? ids.join(',') : 'infra-error';
            const marker = '<!-- shop-monitoring-fingerprint: ' + fingerprint + ' -->';

            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            // Pull all open shop-monitoring issues
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'shop-monitoring',
              per_page: 100
            });

            // Helper: parse the marker out of an existing issue body
            function fpOf(issue) {
              const m = (issue.body || '').match(/<!-- shop-monitoring-fingerprint: ([^>]*) -->/);
              return m ? m[1].trim() : null;
            }

            // Case 1: there is already an open issue with the EXACT same fingerprint
            const exact = existing.find(i => fpOf(i) === fingerprint);
            if (exact) {
              core.info('Existing open issue #' + exact.number + ' has same fingerprint; not creating a new one.');
              core.setOutput('changed', 'false');
              core.setOutput('fingerprint', fingerprint);
              core.setOutput('failure_count', String(failures.length));
              return;
            }

            // Case 2: this run has 0 structured failures (likely WAF / infra blip).
            // If ANY shop-monitoring issue is already open, do not spam a new one.
            if (failures.length === 0 && existing.length > 0) {
              core.info('Infra-only failure (no structured variants) and an open issue exists; skipping new issue.');
              core.setOutput('changed', 'false');
              core.setOutput('fingerprint', fingerprint);
              core.setOutput('failure_count', '0');
              return;
            }

            // Case 3: an open issue covers a SUPERSET of today's failing ids
            // (i.e. today's failures are already known to be broken). Skip.
            const supersetIssue = existing.find(i => {
              const f = fpOf(i);
              if (!f || f === 'infra-error') return false;
              const set = new Set(f.split(','));
              return ids.length > 0 && ids.every(id => set.has(id));
            });
            if (supersetIssue) {
              core.info('Open issue #' + supersetIssue.number + ' already covers today\'s failing variant ids; skipping.');
              core.setOutput('changed', 'false');
              core.setOutput('fingerprint', fingerprint);
              core.setOutput('failure_count', String(failures.length));
              return;
            }

            // Otherwise: real change -> open a fresh issue.
            core.setOutput('changed', 'true');
            core.setOutput('fingerprint', fingerprint);
            core.setOutput('failure_count', String(failures.length));

            const lines = [];
            lines.push('Der tägliche Shop-Monitoring-Lauf ist fehlgeschlagen.');
            lines.push('');
            lines.push('**Betroffene Varianten (' + failures.length + '):**');
            if (failures.length === 0) {
              lines.push('_(keine strukturierten Fehler – wahrscheinlich Infrastruktur-/WAF-Problem; siehe Logs)_');
            } else {
              for (const f of failures) {
                const url = 'https://earlybird-coffee.de/products/' + (f.productHandle || '');
                lines.push('- **' + f.productTitle + '** – Variante: _' + f.variantTitle + '_  ');
                lines.push('  Variant-ID: \`' + f.variantId + '\`  ');
                lines.push('  Grund: ' + f.reason + '  ');
                if (f.productHandle) lines.push('  Produkt: ' + url);
              }
            }
            lines.push('');
            lines.push('**Run / Logs:** ' + runUrl);
            lines.push('');
            lines.push('_Dieses Issue wurde automatisch erstellt. Solange dieselben Varianten betroffen sind, wird kein neues Issue mehr angelegt. Schließe das Issue, sobald das Problem gelöst ist – beim nächsten echten Fehler bekommst du dann wieder eine Mail._');
            lines.push('');
            lines.push(marker);

            const today = new Date().toISOString().slice(0,10);
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Shop Monitoring fehlgeschlagen – ${failures.length} Variante(n) – ${today}`,
              body: lines.join('\n'),
              labels: ['shop-monitoring', 'automated']
            });

      - name: Notify Microsoft Teams (only if webhook configured and failure changed)
        if: steps.shoptest.outcome == 'failure' && steps.notify_issue.outputs.changed == 'true'
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          GH_SERVER_URL: ${{ github.server_url }}
          GH_REPOSITORY: ${{ github.repository }}
          GH_RUN_ID: ${{ github.run_id }}
        run: |
          if [ -z "$TEAMS_WEBHOOK_URL" ]; then
            echo "TEAMS_WEBHOOK_URL secret not set – skipping Teams notification."
            exit 0
          fi
          node .github/scripts/notify-teams.js

      - name: Re-fail job if shop test failed
        if: steps.shoptest.outcome == 'failure'
        run: exit 1
