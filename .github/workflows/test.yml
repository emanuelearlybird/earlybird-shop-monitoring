name: Shop Monitoring

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  test-shop:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npx playwright install --with-deps chromium

      - run: npm test
